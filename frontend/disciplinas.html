<!Doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Disciplinas - Avalia</title>
    <link rel="icon" href="../assets/favicon/favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div data-app-header></div>
    <main class="container page">
        <div class="page-actions">
            <h1>DISCIPLINAS</h1>
            <a class="btn btn-primary" href="disciplina-form.html">+ Nova Disciplina</a>
        </div>
        <div id="lista"></div>
    </main>
    
    <script src="../assets/js/frontend.js"></script>
    <script>
        let items=[];async function load(){items=(await api('disciplinas')).items||[];render()}function render(){lista.innerHTML=table(['Nome','Código','Descrição','Status','Ações'],items.map(d=>`<tr><td>${esc(d.nome)}</td><td>${esc(d.codigo||'-')}</td><td>${esc(d.descricao||'-')}</td><td>${d.ativo==1?statusBadge('ativo'):statusBadge('inativo')}</td><td><a class="btn btn-sm btn-secondary" href="disciplina-form.html?id=${d.id}">Editar</a> <button class="btn btn-sm btn-warning" onclick="statusDisciplina(${d.id},${d.ativo==1?0:1})">${d.ativo==1?'Desativar':'Ativar'}</button> <button class="btn btn-sm btn-danger" ${d.ativo==1?'disabled title="Desative a disciplina antes de excluir"':''} onclick="del(${d.id},${d.ativo})">Excluir</button></td></tr>`))}async function statusDisciplina(id,ativo){const acao=ativo?'ativar':'desativar';if(!(await confirmAction(`Deseja realmente ${acao} esta disciplina?`,ativo?'Ativar disciplina':'Desativar disciplina')))return;try{await api('disciplinas/'+id+'/status',{method:'POST',body:{ativo}});flash(ativo?'Disciplina ativada.':'Disciplina desativada.');load()}catch(e){flash(e.message,'error')}}async function del(id,ativo){const item=items.find(x=>Number(x.id)===Number(id));if(Number(ativo)===1 || (item&&Number(item.ativo)===1))return flash('Desative a disciplina antes de excluir.','error');if(await confirmAction('Excluir definitivamente esta disciplina inativa? Esta ação não pode ser desfeita.','Excluir disciplina')){try{await api('disciplinas/'+id,{method:'DELETE'});flash('Disciplina excluída.');load()}catch(e){flash(e.message,'error')}}}requireAdmin().then(load);
    </script>
</body>
</html>

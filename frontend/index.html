<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avalia</title>
    <link rel="icon" href="../assets/favicon/favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-wrapper">
            <div class="login-logo">
                <div class="login-logo-ico">
                    <span class="login-logo-img logo-mask" role="img" aria-label="Avalia"></span>
                </div>
                <div class="login-logo-text">Avalia</div>
                <div class="login-logo-subtitle">Acesso administrativo</div>
            </div>
            <div class="login-card">
                <h1 class="login-title">Login</h1>
                <div id="erroLogin"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Usuário</label>
                        <input class="form-control" name="usuario" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input class="form-control" type="password" name="senha" required autocomplete="current-password">
                    </div>
                    <button class="btn btn-primary" style="width:100%">Entrar</button>
                </form>
                <p class="text-muted text-center mt-3">Esta versão libera apenas o perfil de administrador.</p>
            </div>
        </div>
    </div>

    <script src="../assets/js/frontend.js"></script>
    <script>
        loginForm.addEventListener('submit',async e=>{e.preventDefault();
            
        try {await api('auth/login',{method:'POST',body:formData(e.target)}); location.href='dashboard.html';
        } catch(err){erroLogin.innerHTML='<div class="alert alert-error">'+esc(err.message)+'</div>';}
        });
        
        if(new URLSearchParams(location.search).get('erro')==='admin')erroLogin.innerHTML='<div class="alert alert-error">Entre com um usuário administrador.</div>';
    </script>
</body>
</html>

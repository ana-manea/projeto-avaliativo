<!Doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Escola - Avalia</title>
    <link rel="icon" href="../assets/favicon/favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div data-app-header></div>
    <main class="container page">
        <div class="page-actions">
            <div>
                <h1 id="title">NOVA ESCOLA</h1>
                <p class="text-muted">Edição em tela separada para evitar estouro de layout.</p>
            </div>
            <a class="btn btn-secondary" href="escolas.html">Voltar</a>
        </div>
        <form id="form" class="card">
            <div class="card-body">
                <input type="hidden" name="id">
                <div class="form-grid-2">
                    <label>Nome<input class="form-control" name="nome" required></label>
                    <label>CNPJ
                        <div class="input-action">
                            <input class="form-control" name="cnpj" id="cnpj" maxlength="18" inputmode="numeric" autocomplete="off" placeholder="00.000.000/0000-00">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="buscarCnpj()">Buscar CNPJ</button>
                        </div>
                    </label>
                    <label>CEP
                        <div class="input-action">
                            <input class="form-control" name="cep" id="cep" required placeholder="01001-000">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="buscarCep()">Buscar CEP</button>
                        </div>
                    </label>
                    <label>Telefone<input class="form-control" name="telefone"></label>
                    <label>Email<input class="form-control" name="email" type="email"></label>
                    <label>Status
                        <select class="form-control" name="ativo">
                            <option value="1">Ativa</option>
                            <option value="0">Inativa</option>
                        </select>
                    </label>
                </div>
                <label>Endereço<textarea class="form-control" name="endereco" required></textarea></label>
                <button class="btn btn-primary mt-3">Salvar</button>
            </div>
        </form>
    </main>
    
    <script src="../assets/js/frontend.js"></script>
    <script src="js/escolas.js"></script>
</body>
</html>

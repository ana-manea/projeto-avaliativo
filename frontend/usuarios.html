<!Doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Usuários - Avalia</title>
    <link rel="icon" href="../assets/favicon/favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div data-app-header></div>
    <main class="container page">
        <div class="page-actions">
            <div>
                <h1>USUÁRIOS</h1>
                <p class="text-muted">Cadastro e gerenciamento por tipo, escola e turma.</p>
            </div>
            <a class="btn btn-primary" href="usuario-form.html">+ Novo usuário</a>
        </div>
        <div class="card mb-3">
            <div class="card-body">
                <input id="busca" class="form-control" placeholder="Buscar por nome, usuário, escola ou turma..." oninput="render()">
            </div>
        </div>
        <div id="lista"></div>
    </main>
    
    <script src="../assets/js/frontend.js"></script>
    <script>
        let users=[],tipos=['aluno','professor','moderador','admin'];async function load(){users=(await api('usuarios')).items||[];render()}function render(){const q=(busca.value||'').toLowerCase();let data=users.filter(u=>(u.nome_completo+' '+u.usuario+' '+(u.escola_nome||'')+' '+(u.turma_nome||'')).toLowerCase().includes(q));lista.innerHTML=tipos.map(t=>{const arr=data.filter(u=>u.nivel===t);return `<section class="card mb-3"><div class="card-header"><h2>${t[0].toUpperCase()+t.slice(1)}s <span class="badge">${arr.length}</span></h2></div>${renderGrupo(t,arr)}</section>`}).join('')}function renderGrupo(t,arr){if(t==='aluno'){const g={};arr.forEach(u=>{const e=u.escola_nome||'Sem escola',tu=u.turma_nome||'Sem turma';(g[e]??={});(g[e][tu]??=[]).push(u)});return Object.entries(g).map(([e,turmas])=>`<div class="card-body"><h3>${esc(e)}</h3>${Object.entries(turmas).map(([tu,us])=>`<h4 class="group-title">${esc(tu)} <span class="badge">${us.length}</span></h4>${userTable(us)}`).join('')}</div>`).join('')||'<div class="card-body text-muted">Nenhum aluno.</div>'}return '<div class="card-body">'+userTable(arr)+'</div>'}function userTable(arr){return table(['Nome','Usuário','CPF/CNPJ','Nível','Email','Status','Ações'],arr.map(u=>`<tr><td>${esc(u.nome_completo)}</td><td>${esc(u.usuario)}</td><td>${esc(u.cpf_cnpj||'-')}</td><td>${esc(u.nivel)}</td><td>${esc(u.email||'-')}</td><td>${u.ativo==1?statusBadge('ativo'):statusBadge('inativo')}</td><td><a class="btn btn-sm btn-secondary" href="usuario-form.html?id=${u.id}">Editar</a> <button class="btn btn-sm btn-warning" onclick="statusUser(${u.id},${u.ativo==1?0:1})">${u.ativo==1?'Desativar':'Ativar'}</button> <button class="btn btn-sm btn-danger" ${u.ativo==1?'disabled title="Desative o usuário antes de excluir"':''} onclick="delUser(${u.id},${u.ativo})">Excluir</button></td></tr>`))}async function statusUser(id,ativo){await api('usuarios/'+id+'/status',{method:'POST',body:{ativo}});flash(ativo?'Usuário ativado.':'Usuário desativado.');load()}async function delUser(id,ativo){if(Number(ativo)===1)return flash('Desative o usuário antes de excluir.','error');if(await confirmAction('Excluir definitivamente este usuário inativo? Esta ação não pode ser desfeita.','Excluir usuário')){await api('usuarios/'+id,{method:'DELETE'});flash('Usuário excluído.');load()}}requireAdmin().then(load);
    </script>
</body>
</html>

<!Doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Logs - Avalia</title>
    <link rel="icon" href="../assets/favicon/favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div data-app-header></div>
    <main class="container page">
        <div class="page-actions">
            <div>
                <h1>LOGS DE ATIVIDADES</h1>
                <p class="text-muted">Registro das ações administrativas realizadas no sistema.</p>
            </div>
            
            <button class="btn btn-secondary" onclick="load()">Atualizar</button>
        </div>
        <div class="card mb-3">
            <div class="card-body form-grid-2">
                <input id="busca" class="form-control" placeholder="Buscar por usuário, ação, entidade ou detalhe..." oninput="render()">
                <select id="limite" class="form-control" onchange="load()">
                    <option value="50">Últimos 50</option>
                    <option value="100">Últimos 100</option>
                    <option value="200">Últimos 200</option>
                </select>
            </div>
        </div>
        <div id="lista"></div>
    </main>
    
    <script src="../assets/js/frontend.js"></script>
    <script>
        let logs=[];async function load(){const r=await api('logs&limit='+(limite?.value||50));logs=r.items||[];render()}function render(){const q=(busca.value||'').toLowerCase();const arr=logs.filter(l=>(`${l.usuario_nome||''} ${l.usuario||''} ${l.acao||''} ${l.entidade||''} ${l.detalhes||''}`).toLowerCase().includes(q));lista.innerHTML=arr.length?`<div class="log-list">${arr.map(l=>`<div class="log-item"><strong>${esc(l.acao||'-')} ${l.entidade?`em ${esc(l.entidade)}`:''}</strong><div>${esc(l.detalhes||'Sem detalhes')}</div><div class="log-meta">${esc(l.usuario_nome||l.usuario||'Sistema')} • ${esc(l.ip||'-')} • ${esc(l.criado_em||'-')}</div></div>`).join('')}</div>`:'<div class="card"><div class="card-body text-muted">Nenhum log encontrado.</div></div>'}requireAdmin().then(load);
    </script>
</body>
</html>
